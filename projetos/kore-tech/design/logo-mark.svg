<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Kore Tech">
  <title>Kore Tech</title>
  <!--
    Kore Tech mark (só o K) — pra favicon, avatar redes sociais, app icon.
    Mesma anatomia do logo principal: K branco + kernel cyan.
  -->

  <!-- Background sutil pra modo light + arredondamento de app icon -->
  <rect width="64" height="64" rx="12" fill="#0A0E14"/>

  <!-- Coluna esquerda do K -->
  <rect x="16" y="14" width="8" height="36" fill="#E8EEF5"/>
  <!-- Diagonal superior do K -->
  <path d="M 24 32 L 40 14 L 50 14 L 34 32 Z" fill="#E8EEF5"/>
  <!-- Diagonal inferior do K -->
  <path d="M 24 32 L 40 50 L 50 50 L 34 32 Z" fill="#E8EEF5"/>
  <!-- Kernel cyan -->
  <circle cx="30" cy="32" r="3.5" fill="#00E5FF"/>
</svg>
