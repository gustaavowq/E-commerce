# =============================================================================
# Marquesa — Nginx site config (host VPS Ever Growth)
# Path destino: /etc/nginx/sites-available/gustavo-marquesa
# Symlink:      /etc/nginx/sites-enabled/gustavo-marquesa
#
# certbot --nginx -d marquesa.gustavo.agenciaever.cloud vai injetar
# automaticamente o bloco 443 + redirect HTTP->HTTPS.
#
# Tráfego:
#   marquesa.gustavo.agenciaever.cloud/         -> 127.0.0.1:8210 (Next.js web)
#   marquesa.gustavo.agenciaever.cloud/api/*    -> 127.0.0.1:8211 (Express API)
# =============================================================================

# Rate limit — escopo do servidor (zone vai pro http{} via /etc/nginx/conf.d se
# preferir global. Aqui declaramos local pra não conflitar com outros sites.)
limit_req_zone $binary_remote_addr zone=marquesa_api:10m   rate=20r/s;
limit_req_zone $binary_remote_addr zone=marquesa_auth:10m  rate=5r/s;

# Upstreams (facilita troca de porta se precisar)
upstream marquesa_web { server 127.0.0.1:8210; keepalive 16; }
upstream marquesa_api { server 127.0.0.1:8211; keepalive 16; }

server {
    listen 80;
    listen [::]:80;
    server_name marquesa.gustavo.agenciaever.cloud;

    # certbot vai adicionar o bloco 443 + redirect aqui na 1a execução.
    # Antes do SSL: tudo serve em HTTP (apenas durante o setup).

    # ---------- security headers (todos os locations) ----------
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # HSTS so sera adicionado pelo certbot via configuracao SSL.

    # ---------- compression ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        image/svg+xml;

    # ---------- limites ----------
    client_max_body_size 10m;     # uploads de imagem (Cloudinary, mas via API)

    # ---------- API ----------
    # Webhook MP precisa entregar mesmo com header esquisito; deixar especifico
    # ANTES do /api/ generico pra ter regex prioritaria de location.
    location = /api/webhooks/mercadopago {
        proxy_pass         http://marquesa_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
        # MP retry em caso de 5xx — nao bloqueia
    }

    # Login/register — limite mais agressivo (anti brute-force)
    location ~ ^/api/auth/(login|register|reset|forgot) {
        limit_req zone=marquesa_auth burst=10 nodelay;
        proxy_pass         http://marquesa_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API geral
    location /api/ {
        limit_req zone=marquesa_api burst=40 nodelay;
        proxy_pass         http://marquesa_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Healthcheck publico (uptime monitor)
    location = /healthz {
        proxy_pass         http://marquesa_api/healthz;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ---------- Frontend Next.js (default) ----------
    # Assets estaticos do Next (cache longo via _next/static)
    location /_next/static/ {
        proxy_pass         http://marquesa_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Next ja envia Cache-Control imutavel; reforcamos
        expires 365d;
        access_log off;
    }

    location / {
        proxy_pass         http://marquesa_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
