# =============================================================================
# Kore Tech — Nginx config (dev)
# Mantido pelo DevOps (Agente 05).
#
# Roteamento por subdominio (.test = TLD reservado pra dev, RFC 6761):
#   loja.kore.test    -> frontend:3001   (loja Next.js)
#   admin.kore.test   -> dashboard:3002  (painel admin Next.js)
#   api.kore.test     -> backend:4001    (API Express)
#
# Pre-requisito no host: adicionar ao hosts file:
#   127.0.0.1 loja.kore.test admin.kore.test api.kore.test
#
# Acesso: http://loja.kore.test:8081 (porta 8081 mapeia 80 do nginx).
# =============================================================================

# Rate limit zones (anti-abuse em dev, replicado em prod via Railway/Vercel)
limit_req_zone $binary_remote_addr zone=apilimit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=authlimit:10m rate=5r/s;

# Upstreams (nomes batem com os service names do docker-compose)
upstream backend_upstream {
    server backend:4001;
    keepalive 16;
}
upstream frontend_upstream {
    server frontend:3001;
    keepalive 16;
}
upstream dashboard_upstream {
    server dashboard:3002;
    keepalive 16;
}

# WebSocket upgrade (Next.js HMR)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# =============================================================================
# api.kore.test -> backend
# =============================================================================
server {
    listen 80;
    server_name api.kore.test;

    client_max_body_size 15m;

    # Headers de seguranca obrigatorios em todas as responses
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP omitido: API responde JSON.

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Auth com rate limit mais agressivo (anti-bruteforce)
    location ~ ^/auth/(login|register) {
        limit_req zone=authlimit burst=10 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=apilimit burst=40 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}

# =============================================================================
# admin.kore.test -> dashboard (Next.js painel admin)
# =============================================================================
server {
    listen 80;
    server_name admin.kore.test;

    client_max_body_size 15m;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP omitido: Next.js (dashboard) emite via next.config.mjs (evita duplicidade).

    location / {
        proxy_pass http://dashboard_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR via WebSocket
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}

# =============================================================================
# loja.kore.test -> frontend (Next.js loja) [DEFAULT]
# Aceita "localhost" tambem como fallback enquanto user nao editou hosts file.
# =============================================================================
server {
    listen 80 default_server;
    server_name loja.kore.test localhost;

    client_max_body_size 15m;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP omitido: Next.js (frontend) emite via next.config.mjs.

    # Healthcheck publico (probe externo: pinga backend via nginx)
    location = /healthz {
        proxy_pass http://backend_upstream/healthz;
        access_log off;
    }

    # Compat: enquanto frontend usar NEXT_PUBLIC_API_URL=/api, manter rota
    # /api -> backend pra nao quebrar se hosts file nao tiver sido editado.
    location /api/ {
        limit_req zone=apilimit burst=40 nodelay;

        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR via WebSocket
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}
