# =============================================================================
# Miami Store — Nginx config (dev)
# Mantido pelo DevOps (Agente 05).
#
# Roteamento por subdomínio (.test = TLD reservado pra dev, RFC 6761):
#   miami.test         → frontend:3000   (loja)
#   admin.miami.test   → dashboard:3002  (painel admin)
#   api.miami.test     → backend:3001    (API)
#
# Pré-requisito no host: adicionar ao C:\Windows\System32\drivers\etc\hosts:
#   127.0.0.1 miami.test admin.miami.test api.miami.test
# =============================================================================

# Limita conexões por IP — proteção básica anti-abuse em dev
limit_req_zone $binary_remote_addr zone=apilimit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=authlimit:10m rate=5r/s;

# Upstreams (nomes batem com os service names do docker-compose)
upstream backend_upstream {
    server backend:3001;
    keepalive 16;
}
upstream frontend_upstream {
    server frontend:3000;
    keepalive 16;
}
upstream dashboard_upstream {
    server dashboard:3002;
    keepalive 16;
}

# -----------------------------------------------------------------------------
# Headers comuns + timeouts (aplicados em cada server via include? não dá em
# nginx open source — replicamos. Considerar refatorar com snippet em prod).
# -----------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# =============================================================================
# api.miami.test → backend
# =============================================================================
server {
    listen 80;
    server_name api.miami.test;

    client_max_body_size 10m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Auth com rate limit mais agressivo (anti-bruteforce)
    location ~ ^/auth/(login|register) {
        limit_req zone=authlimit burst=10 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=apilimit burst=40 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}

# =============================================================================
# admin.miami.test → dashboard (Next.js painel admin)
# =============================================================================
server {
    listen 80;
    server_name admin.miami.test;

    client_max_body_size 10m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://dashboard_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR via WebSocket
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}

# =============================================================================
# miami.test → frontend (Next.js loja) [DEFAULT]
# Aceita também "localhost" como fallback enquanto user não editou hosts file.
# =============================================================================
server {
    listen 80 default_server;
    server_name miami.test localhost;

    client_max_body_size 10m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Healthcheck (probe externo continua funcionando)
    location = /healthz {
        proxy_pass http://backend_upstream/healthz;
        access_log off;
    }

    # Compat: enquanto frontend ainda usa NEXT_PUBLIC_API_URL=/api, manter rota
    # /api → backend pra não quebrar se hosts file não tiver sido editado.
    location /api/ {
        limit_req zone=apilimit burst=40 nodelay;

        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR via WebSocket
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}
