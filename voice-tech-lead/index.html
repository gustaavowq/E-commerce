<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; media-src 'self' blob:" />
  <title>Tech-Lead — voz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="avatar">
        <img id="robo" src="assets/robo.png" alt="Tech-Lead robô" />
        <span class="status-dot" id="dot"></span>
      </div>
      <h1>Tech-Lead</h1>
      <p class="subtitle" id="status">Inicializando…</p>
    </header>

    <section class="controls">
      <button id="record" class="btn btn-primary" disabled>
        <span class="icon">🎤</span>
        <span>Gravar</span>
      </button>
      <button id="stop" class="btn btn-secondary" disabled>
        <span class="icon">⏹</span>
        <span>Parar</span>
      </button>
      <span class="timer" id="timer">0:00</span>
    </section>

    <section class="transcript-wrap">
      <div class="transcript-header">
        <label for="transcript">Transcrição</label>
        <div class="transcript-actions">
          <button id="copy" class="btn-link" disabled>Copiar</button>
          <button id="clear" class="btn-link" disabled>Limpar</button>
        </div>
      </div>
      <textarea id="transcript" placeholder="O que você falar aparece aqui. Pode editar antes de enviar."></textarea>
    </section>

    <section class="footer">
      <button id="send" class="btn btn-send" disabled>
        <span class="icon">📤</span>
        <span>Enviar pro terminal (Ctrl+V + Enter)</span>
      </button>
      <p class="hint">Atalho global: <kbd>F9</kbd> (cola+envia na janela em foco). Tenha o terminal do Claude Code visível antes.</p>
    </section>

    <div class="toast" id="toast" hidden></div>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
